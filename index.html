<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaCode - AI Code Animation Renderer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="bg-slate-900 h-screen flex text-slate-200 overflow-hidden relative">
    
    <!-- 녹화 중 표시기 -->
    <div id="recordingIndicator" class="fixed top-4 right-4 z-50 items-center gap-2 bg-red-600/90 text-white px-3 py-1.5 rounded-full font-bold text-xs animate-pulse hidden">
        <div class="w-2 h-2 rounded-full bg-white"></div>
        REC 렌더링 중...
    </div>

    <!-- 사이드바 (컨트롤 패널) - flex-col과 h-full로 한 화면에 맞춤 -->
    <aside id="sidebar" style="width: 320px; min-width: 250px; max-width: 50vw;" class="flex flex-col z-20 flex-shrink-0 absolute lg:relative h-full transition-transform duration-300 -translate-x-full lg:translate-x-0">
        <!-- p-4, gap-3 등 컴팩트한 간격으로 조정 -->
        <div class="p-6 flex-1 flex flex-col gap-5 h-full">
            
            <!-- 간소화된 타이틀 -->
            <div class="mb-2">
                <h1 class="text-xl font-bold text-white flex items-center gap-3">
                    <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M11.182.008C11.148-.03 9.923.023 8.857 1.18c-1.066 1.156-.902 2.482-.878 2.516s1.52.087 2.475-1.258.762-2.391.728-2.43m3.314 11.733c-.048-.096-2.325-1.234-2.113-3.422s1.675-2.789 1.698-2.854-.597-.79-1.254-1.157a3.7 3.7 0 0 0-1.563-.434c-.108-.003-.483-.095-1.254.116-.508.139-1.653.589-1.968.607-.316.018-1.256-.522-2.267-.665-.647-.125-1.333.131-1.824.328-.49.196-1.422.754-2.074 2.237-.652 1.482-.311 3.83-.067 4.56s.625 1.924 1.273 2.796c.576.984 1.34 1.667 1.659 1.899s1.219.386 1.843.067c.502-.308 1.408-.485 1.766-.472.357.013 1.061.154 1.782.539.571.197 1.111.115 1.652-.105.541-.221 1.324-1.059 2.238-2.758q.52-1.185.473-1.282"/>
                    </svg>
                    MaCode
                </h1>
            </div>

            <!-- 파일 이름 설정 -->
            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-slate-300">파일 이름</label>
                <input type="text" id="fileNameInput" value="macode-render.js" class="w-full p-1.5 bg-slate-900 border border-slate-700 rounded-md font-mono text-xs text-slate-300 focus:outline-none focus:border-blue-500">
            </div>

            <!-- 소스 코드 (flex-1로 남는 공간 모두 차지) -->
            <div class="flex flex-col gap-1.5 flex-1 min-h-0">
                <label class="text-xs font-semibold text-slate-300">소스 코드</label>
                <textarea id="codeInput" class="w-full h-full p-2 bg-slate-900 border border-slate-700 rounded-md font-mono text-xs text-slate-300 resize-none focus:outline-none focus:border-blue-500 flex-1 overflow-y-auto" spellcheck="false">
// AI가 작성한 샘플 코드
async function initializeSystem() {
    console.log("시스템 초기화를 시작합니다...");
    
    const config = {
        mode: "AI_GENERATION",
        speed: "ultra-fast",
        retries: 3
    };

    for (let i = 0; i < config.retries; i++) {
        await connectToNeuralNetwork();
        renderInterface();
    }
    
    return "준비 완료!";
}</textarea>
            </div>

            <!-- 언어 선택 -->
            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-slate-300">언어 선택</label>
                <select id="languageSelect" class="w-full p-1.5 bg-slate-900 border border-slate-700 rounded-md text-xs text-slate-300 focus:outline-none focus:border-blue-500">
                    <option value="javascript">JavaScript / TypeScript</option>
                    <option value="python">Python</option>
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="java">Java / C++</option>
                </select>
            </div>

            <!-- 타이핑 속도 -->
            <div class="flex flex-col gap-1.5">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-semibold text-slate-300">타이핑 속도</label>
                    <span id="speedValue" class="text-xs text-blue-400 font-mono">4 - 빠름</span>
                </div>
                <input type="range" id="speedInput" min="1" max="5" value="4" step="1" class="w-full accent-blue-500 h-1.5">
            </div>

            <!-- AI 청크 모드 -->
            <div class="flex items-center gap-2">
                <input type="checkbox" id="aiMode" checked class="w-3.5 h-3.5 rounded bg-slate-900 border-slate-700 text-blue-500 focus:ring-blue-500 focus:ring-offset-slate-800">
                <label for="aiMode" class="text-xs font-semibold text-slate-300 select-none cursor-pointer">AI 청크 모드 (단어 단위 출력)</label>
            </div>

            <!-- 버튼 영역 -->
            <div class="mt-1 flex flex-col gap-2">
                <button id="previewBtn" class="w-full bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-md font-semibold transition text-xs flex items-center justify-center gap-2">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path></svg>
                    미리보기 (재설정)
                </button>
                <button id="startBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2.5 rounded-md font-bold shadow-lg shadow-blue-500/30 transition text-xs flex items-center justify-center gap-2">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    렌더링 시작 (전체화면)
                </button>
            </div>
        </div>
    </aside>

    <!-- 화면 분할용 세로 바 (Resizer) -->
    <div id="resizer" class="w-1.5 bg-slate-800 border-r border-slate-700 cursor-col-resize z-30 hidden lg:block hover:bg-blue-500 transition-colors flex-shrink-0"></div>

    <!-- 사이드바 토글 버튼 (모바일 및 전체화면 시 사용) -->
    <button id="toggleSidebar" class="absolute top-4 left-4 z-40 p-2 rounded-lg bg-slate-800/80 hover:bg-slate-700 text-slate-300 transition backdrop-blur-sm shadow-md lg:hidden">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>

    <!-- 메인 프레젠테이션 영역 -->
    <main id="mainArea" class="flex-1 presentation-bg flex items-center justify-center p-8 lg:p-20 relative h-full overflow-hidden">
        
        <!-- Mac 스타일 코드 창 -->
        <div class="w-full max-w-4xl shadow-2xl rounded-xl overflow-hidden border" style="background-color: var(--mac-bg); border-color: var(--mac-border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
            
            <!-- 타이틀바 -->
            <div class="h-10 flex items-center px-4" style="background-color: var(--mac-titlebar);">
                <div class="flex gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                </div>
                <div id="windowTitle" class="flex-1 text-center font-mono text-xs text-slate-400 select-none">
                    macode-render.js
                </div>
            </div>

            <!-- 코드 출력 영역 (공백으로 인한 정렬 오류 방지를 위해 태그를 한 줄로 밀착) -->
            <div class="p-6 h-[60vh] min-h-[400px] overflow-y-auto relative font-mono text-sm sm:text-base leading-relaxed" id="codeDisplay" style="color: #d4d4d4;"><span id="outputBox"></span><span class="cursor-block" id="cursor"></span></div>
        </div>
        
    </main>

    <script src="js/utils.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
